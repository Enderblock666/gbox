<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gbox - Đăng nhập</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <div class="login-container">
        <a href="index.html" style="text-decoration: none; color: white;"><h1>Gbox</h1></a>
        
        <form action="index.html">
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password">
            </div>
            
            <div class="form-options">
                <label><input type="checkbox"> Keep me logged in</label>
                <div>
                    <a href="#">Forgot your password?</a> | 
                    <a href="#" style="color: white; font-weight: bold;">Sign up</a>
                </div>
            </div>

            <button type="submit" class="btn-go">Go</button>
            
            <div style="text-align: center; margin-bottom: 20px; color: var(--text-main);">or</div>

            <div class="social-login">
                <button type="button">Connect with Google</button>
                <button type="button">Connect with Facebook</button>
            </div>
        </form>
    </div>
</body>
</html>
