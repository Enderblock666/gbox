<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gbox - Login</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="login-page">
    <div class="login-box">
        <img src="../logo.jpg" alt="Gbox Logo" class="login-logo-img">
        
        <div id="login-form">
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="username" placeholder="Nhập tên đăng nhập...">
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label>Password</label>
                    <a href="#" class="forgot-link">Forgot your password?</a>
                </div>
                <input type="password" id="password" placeholder="Nhập mật khẩu...">
            </div>

            <div class="options-row">
                <label class="checkbox-container">
                    <input type="checkbox"> Keep me logged in
                </label>
                <a href="#" class="signup-link">Sign up</a>
            </div>

            <div class="button-wrapper">
                <button onclick="handleLogin()" class="btn-go">Go</button>
            </div>

            <div class="or-separator">
                <span>or</span>
            </div>

            <div class="social-buttons">
                <button class="btn-social">Connect with Google</button>
                <button class="btn-social">Connect with Facebook</button>
            </div>
        </div>
    </div>

    <script>
        // Nếu người dùng đã đăng nhập từ trước, tự động văng vào trang Store
        if (sessionStorage.getItem('user')) {
            window.location.href = 'store.html';
        }

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u && p) {
                // Lưu trạng thái đăng nhập
                sessionStorage.setItem('user', u);
                window.location.href = 'store.html'; // Chuyển sang Store
            } else {
                alert("Vui lòng điền tài khoản và mật khẩu!");
            }
        }
    </script>
</body>
</html>
